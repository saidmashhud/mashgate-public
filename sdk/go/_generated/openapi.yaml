components:
    schemas:
        AcceptMerchantRequest:
            type: object
            properties:
                tenantId:
                    type: string
                merchantId:
                    type: string
                note:
                    type: string
        AccessBundle:
            type: object
            properties:
                code:
                    type: string
                description:
                    type: string
                permissions:
                    type: array
                    items:
                        type: string
        AccessConstraint:
            type: object
            properties:
                type:
                    type: string
                id:
                    type: string
                status:
                    type: string
                detail:
                    type: string
        AccessGrant:
            type: object
            properties:
                type:
                    type: string
                id:
                    type: string
                name:
                    type: string
                detail:
                    type: string
        AddBlocklistEntryRequest:
            type: object
            properties:
                tenantId:
                    type: string
                entryType:
                    type: string
                value:
                    type: string
                reason:
                    type: string
                expiresAt:
                    type: string
        AddBlocklistEntryResponse:
            type: object
            properties:
                entry:
                    $ref: '#/components/schemas/BlocklistEntry'
        AddGroupMemberRequest:
            type: object
            properties:
                tenantId:
                    type: string
                groupId:
                    type: string
                principalId:
                    type: string
        AddGroupMemberResponse:
            type: object
            properties:
                success:
                    type: boolean
        AddPaymentMethodRequest:
            type: object
            properties:
                tenantId:
                    type: string
                token:
                    type: string
                setDefault:
                    type: boolean
        AddWalletPaymentMethodCommand:
            type: object
            properties:
                tenantId:
                    type: string
                userId:
                    type: string
                idempotencyKey:
                    type: string
                token:
                    type: string
                provider:
                    type: string
                brand:
                    type: string
                last4:
                    type: string
                bin:
                    type: string
                expMonth:
                    type: integer
                    format: int32
                expYear:
                    type: integer
                    format: int32
                cardholderName:
                    type: string
                setDefault:
                    type: boolean
                metadata:
                    type: object
                    additionalProperties:
                        type: string
        AddWalletPaymentMethodResponse:
            type: object
            properties:
                paymentMethod:
                    $ref: '#/components/schemas/WalletPaymentMethodView'
        AdminSubscription:
            type: object
            properties:
                tenantId:
                    type: string
                tenantName:
                    type: string
                planId:
                    type: string
                planName:
                    type: string
                status:
                    type: integer
                    format: enum
                mrr:
                    type: string
                currency:
                    type: string
                startedAt:
                    type: string
                    format: date-time
        AlertEvidence:
            type: object
            properties:
                evidenceType:
                    type: string
                referenceId:
                    type: string
                description:
                    type: string
                url:
                    type: string
        AnomaliesResponse:
            type: object
            properties:
                anomalies:
                    type: array
                    items:
                        $ref: '#/components/schemas/Anomaly'
                totalCount:
                    type: integer
                    format: int32
        Anomaly:
            type: object
            properties:
                anomalyId:
                    type: string
                type:
                    type: string
                severity:
                    type: string
                description:
                    type: string
                affectedEntities:
                    type: array
                    items:
                        type: string
                score:
                    type: number
                    format: float
                detectedAt:
                    type: string
                metadata:
                    type: object
                    additionalProperties:
                        type: string
        ApiKey:
            type: object
            properties:
                apiKeyId:
                    type: string
                tenantId:
                    type: string
                clientId:
                    type: string
                name:
                    type: string
                prefix:
                    type: string
                scopes:
                    type: array
                    items:
                        type: string
                rpm:
                    type: integer
                    format: int32
                burst:
                    type: integer
                    format: int32
                status:
                    type: string
                createdAt:
                    type: string
                rotatedAt:
                    type: string
                expiresAt:
                    type: string
        AppPermission:
            type: object
            properties:
                appId:
                    type: string
                scope:
                    type: string
                description:
                    type: string
                category:
                    type: string
            description: |-
                A permission that an App declares it may request at runtime.
                 Administrators grant these scopes to roles via iam.v1.IamService/GrantScopeToRole.
        AppScope:
            type: object
            properties:
                clientId:
                    type: string
                scopeCode:
                    type: string
                description:
                    type: string
                createdAt:
                    type: string
        Application:
            type: object
            properties:
                appId:
                    type: string
                tenantId:
                    type: string
                name:
                    type: string
                appType:
                    type: string
                status:
                    type: string
                description:
                    type: string
                metadata:
                    type: object
                    additionalProperties:
                        type: string
                createdAt:
                    type: string
                updatedAt:
                    type: string
        AssessPaymentRiskRequest:
            type: object
            properties:
                tenantId:
                    type: string
                paymentId:
                    type: string
                amount:
                    $ref: '#/components/schemas/Money'
                customerId:
                    type: string
                paymentMethodToken:
                    type: string
                context:
                    $ref: '#/components/schemas/RiskContext'
        AssessRefundRiskRequest:
            type: object
            properties:
                tenantId:
                    type: string
                paymentId:
                    type: string
                amount:
                    $ref: '#/components/schemas/Money'
                reason:
                    type: string
                customerId:
                    type: string
                context:
                    $ref: '#/components/schemas/RiskContext'
        AssetBalance:
            type: object
            properties:
                asset:
                    type: integer
                    format: enum
                network:
                    type: integer
                    format: enum
                balance:
                    type: string
                usdValue:
                    type: string
        AssignRoleRequest:
            type: object
            properties:
                tenantId:
                    type: string
                principalId:
                    type: string
                roleId:
                    type: string
        AssignRoleResponse:
            type: object
            properties:
                success:
                    type: boolean
        Attestation:
            type: object
            properties:
                token:
                    type: string
                nonce:
                    type: string
                expiresAt:
                    type: string
                constraints:
                    $ref: '#/components/schemas/RefundConstraints'
            description: Attestation - Cryptographic proof from BFF
        AuditEvent:
            type: object
            properties:
                eventId:
                    type: string
                tenantId:
                    type: string
                actorPrincipalId:
                    type: string
                action:
                    type: string
                targetType:
                    type: string
                targetId:
                    type: string
                detailsJson:
                    type: string
                occurredAt:
                    type: string
        AuditLogEntry:
            type: object
            properties:
                id:
                    type: string
                tenantId:
                    type: string
                ruleId:
                    type: string
                requestId:
                    type: string
                actionTaken:
