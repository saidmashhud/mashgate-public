        BuildSolanaTransferTxRequest:
            type: object
            properties:
                fromPubkeyBase58:
                    type: string
                    description: |-
                        The fee payer and signer of the transaction. Must match the wallet
                         owning `from_token_account` (or the source for native SOL transfers).
                toPubkeyBase58:
                    type: string
                    description: |-
                        Recipient wallet (SOL transfer) or recipient owner (SPL token transfer
                         — chain-rpc derives the destination ATA on the fly).
                mintBase58:
                    type: string
                    description: |-
                        SPL token mint, base58 (e.g. USDT mainnet
                         "Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB"). Empty = native SOL
                         transfer.
                amount:
                    type: string
                    description: |-
                        Amount as a decimal string (e.g. "100.50"). chain-rpc multiplies by the
                         token decimals (looked up via getTokenSupply for SPL, or 9 for SOL) and
                         packs the result into the instruction.
                recentBlockhashBase58:
                    type: string
                    description: |-
                        Recent blockhash from GetRecentBlockhash. Caller is responsible for
                         refreshing it if the build → sign → broadcast roundtrip exceeds the
                         ~60-second blockhash validity window.
        BuildSolanaTransferTxResponse:
            type: object
            properties:
                unsignedMessageBase64:
                    type: string
                    description: |-
                        Serialized Solana transaction message (legacy v0 unsigned), base64.
                         The caller signs the SHA-512/Ed25519 of this message with its private
                         key, prepends signature(s), and submits via BroadcastTransaction.
                messageHashHex:
                    type: string
                    description: |-
                        Echo of the message hash that needs to be signed. Hex-encoded, useful
                         for sanity checks before signing.
                feeLamports:
                    type: string
                    description: |-
                        Estimated fee in lamports (base 5000 + ATA rent if a new ATA needs
                         to be created for the recipient).
                error:
                    type: string
